version: "3"

dotenv:
  - .env

vars:
  MIGRATIONS_PATH: ./internal/shared/database/migrations
  ENTERY_PATH: ./cmd/api
  OUTPUT_PATH: ./bin/api.exe

tasks:
  format:
    desc: Format source code
    cmds:
      - gofmt -w .

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  dev:
    desc: Run the development app with hot-reload
    cmds:
      - air

  build:
    desc: Build the API binary
    cmds:
      - go build -o {{.OUTPUT_PATH}} {{.ENTERY_PATH}}

  migration-up:
    desc: "run database up migrations"
    cmds:
      - migrate -path {{.MIGRATIONS_PATH}} -database "{{.DATABASE_URL}}" up

  migrate-down:
    desc: Roll back one migration
    cmds:
      - migrate -path {{.MIGRATIONS_PATH}} -database "{{.DATABASE_URL}}" down 1

  migrate-create:
    desc: Create new database migration
    cmds:
      - migrate create -ext sql -dir {{.MIGRATIONS_PATH}} -seq {{.CLI_ARGS}}
